<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:#F7F7F8;color:#111;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#F7F7F8;position:relative}
.header{background:#fff;border-bottom:1px solid #F0F0F0;padding:50px 20px 14px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo-app{height:42px;width:auto;object-fit:contain}
.content{padding:14px 14px 96px}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-top:1px solid #F0F0F0;display:flex;padding:8px 2px 20px;z-index:200}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:4px 0;font-family:'Outfit',sans-serif}
.ni{width:34px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s}
.nb.active .ni{background:#111}
.nl{font-size:9px;font-weight:700;color:#9CA3AF}
.nb.active .nl{color:#111}
.card{background:#fff;border-radius:16px;border:1px solid #F0F0F0;box-shadow:0 1px 6px rgba(0,0,0,.05);padding:16px;margin-bottom:12px}
.krow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kcard{background:#fff;border-radius:14px;border:1px solid #F0F0F0;box-shadow:0 1px 4px rgba(0,0,0,.04);padding:13px}
.kicon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:9px;font-size:13px}
.kval{font-size:13px;font-weight:800;color:#111;line-height:1.2}
.klbl{font-size:10px;color:#9CA3AF;margin-top:3px}
.sep{height:1px;background:linear-gradient(90deg,transparent,#E5E7EB,transparent);margin:16px 0}
.sec-title{font-size:13px;font-weight:800;color:#111;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.bp{background:#111;color:#fff}
.bo{background:transparent;color:#111;border:1.5px solid #E5E7EB}
.bs{background:#F5F5F5;color:#111}
.bd{background:#FEE2E2;color:#DC2626}
.bg2{background:#DCFCE7;color:#166534}
.bfull{width:100%;justify-content:center}
.bsm{padding:7px 11px;font-size:11px}
.field{margin-bottom:11px}
.field label{display:block;color:#6B7280;font-size:10px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;background:#fff;border:1.5px solid #E5E7EB;border-radius:9px;padding:9px 11px;color:#111;font-size:16px;outline:none;box-sizing:border-box;font-family:'Outfit',sans-serif}
.field input:focus,.field select:focus{border-color:#111}
.field input::placeholder{color:#D1D5DB}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;user-select:none}
.bd-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.bg-gr{background:#DCFCE7;color:#166534}.bg-gr .bd-dot{background:#22C55E}
.bg-yw{background:#FEF3C7;color:#92400E}.bg-yw .bd-dot{background:#F59E0B}
.bg-bl{background:#DBEAFE;color:#1E40AF}.bg-bl .bd-dot{background:#3B82F6}
.moverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:18px 18px 34px;max-height:93vh;overflow-y:auto;animation:slideUp .2s ease}
.mhandle{width:34px;height:4px;border-radius:4px;background:#E5E7EB;margin:0 auto 18px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mtitle{font-size:16px;font-weight:800;color:#111}
.mclose{background:#F5F5F5;border:none;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.alert{padding:9px 13px;border-radius:9px;margin-bottom:12px;font-size:12px;line-height:1.5}
.a-ok{background:#F0FDF4;border:1px solid #BBF7D0;color:#15803D}
.a-err{background:#FFF7F7;border:1px solid #FECACA;color:#B91C1C}
.a-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8}
.a-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.ai-box{text-align:center;padding:30px 0}
.ai-spin{width:48px;height:48px;border-radius:50%;background:#F0F0FF;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:spin 1.3s linear infinite;font-size:20px}
.li{background:#fff;border-radius:13px;border:1px solid #F0F0F0;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.li.clickable{cursor:pointer}
.li.clickable:active{background:#F9FAFB}
.tab-bar{display:flex;background:#F3F4F6;border-radius:11px;padding:3px;margin-bottom:13px}
.tab-btn{flex:1;padding:7px 0;border-radius:9px;border:none;background:transparent;color:#9CA3AF;font-weight:700;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.tab-btn.active{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;border:none;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif}
.chip-on{background:#111;color:#fff}
.chip-off{background:#F3F4F6;color:#374151}
.view{display:none}
.view.active{display:block;animation:fadeIn .18s ease}
.empty{text-align:center;padding:40px 16px;color:#9CA3AF;font-size:13px}
.rtag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
.prog-bar{height:6px;border-radius:6px;background:#F3F4F6;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:6px;transition:width .5s ease}
.forecast-card{background:linear-gradient(135deg,#111 0%,#333 100%);border-radius:16px;padding:16px;margin-bottom:12px;color:#fff}
.analysis-card{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:16px;padding:16px;margin-bottom:12px;color:#fff}
.top10-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F5F5F5}
.top10-rank{width:20px;height:20px;border-radius:6px;background:#111;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top10-rank.gold{background:#D4A017}
.top10-rank.silver{background:#9CA3AF}
.top10-rank.bronze{background:#CD7C2F}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
select option{background:#fff;color:#111}
@keyframes slideUp{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>

// Number to words FR
function nLet(n){
  const u=["","Un","Deux","Trois","Quatre","Cinq","Six","Sept","Huit","Neuf","Dix","Onze","Douze","Treize","Quatorze","Quinze","Seize","Dix-Sept","Dix-Huit","Dix-Neuf"];
  const d=["","","Vingt","Trente","Quarante","Cinquante","Soixante","Soixante","Quatre-Vingt","Quatre-Vingt"];
  function g(x){if(!x)return "";let r="";if(x>=100){r+=(Math.floor(x/100)===1?"Cent":u[Math.floor(x/100)]+" Cent");x%=100;if(x)r+=" ";}if(x>=20){const dz=Math.floor(x/10),un=x%10;if(dz===7||dz===9){r+=d[dz]+"-"+u[10+un];}else{r+=d[dz];if(un===1&&dz!==8)r+="-Et-Un";else if(un)r+="-"+u[un];}}else if(x>0)r+=u[x];return r;}
  let ent=Math.floor(n),dec=Math.round((n-ent)*1000);
  let res="";
  if(ent>=1000){const m=Math.floor(ent/1000);res+=(m===1?"Mille":g(m)+" Mille");ent%=1000;if(ent)res+=" ";}
  if(ent)res+=g(ent);
  res+=" Dinars";
  if(dec>0)res+=" Et "+g(dec)+" Millimes";
  return res.trim();
}

// ════ ARTICLE SELECTION ════
function pickArticles(targetHT,arts,minItems){
  minItems=minItems||10;
  const av=[...arts].filter(a=>a.prix>0).sort((a,b)=>b.prix-a.prix);
  const n=Math.min(minItems,av.length);
  let sel=av.slice(0,n).map(a=>({...a,quantite:1,totalHT:Math.round(a.prix*1000)/1000}));
  let usedHT=sel.reduce((s,a)=>s+a.totalHT,0);
  let remM=Math.round((targetHT-usedHT)*1000);
  if(remM>0){
    const pm0=Math.round(av[0].prix*1000);
    const extraQ=Math.floor(remM/pm0);
    if(extraQ>0){sel[0].quantite+=extraQ;sel[0].totalHT=Math.round(sel[0].quantite*pm0)/1000;remM-=extraQ*pm0;}
    for(let i=1;i<sel.length&&remM>0;i++){
      const pm=Math.round(sel[i].prix*1000);
      if(pm<=remM){const eq=Math.floor(remM/pm);sel[i].quantite+=eq;sel[i].totalHT=Math.round(sel[i].quantite*pm)/1000;remM-=eq*pm;}
    }
  }
  const tHT=Math.round(sel.reduce((s,a)=>s+a.totalHT,0)*1000)/1000;
  const taxes=Math.round(tHT*TVA*1000)/1000;
  const tTTC=Math.round((tHT+taxes+TIM)*1000)/1000;
  return {items:sel,totalHT:tHT,taxes,totalTTC:tTTC};
}

// ════ TOP ARTICLES ════
function getTopArticles(n){
  n=n||10;
  const map={};
  S.ventes.forEach(v=>{
    (v.items||[]).forEach(it=>{
      if(!map[it.nom])map[it.nom]={nom:it.nom,qty:0,ht:0};
      map[it.nom].qty+=Number(it.quantite)||0;
      map[it.nom].ht+=Number(it.totalHT)||0;
    });
  });
  return Object.values(map).sort((a,b)=>b.qty-a.qty).slice(0,n);
}

// ════ GEMINI AI (vision OCR) ════
async function geminiRead(b64,mimeType){
  mimeType=mimeType||"image/jpeg";
  const prompt="INSTRUCTIONS: Lis ce rapport de ventes Topos (rapport 210 - Statistique Articles). Colonnes: Designation | TTC | Remise | Brut | Hors taxes | Quantite. En bas: ligne NOURRITURE, puis ligne NOM RESTAURANT (JOLENE, MOLO ou AINA) en gras majuscules, puis grand total. TROUVE la ligne JOLENE/MOLO/AINA et lis le chiffre colonne BRUT (nombre entre 5000 et 200000). Lis aussi la periode en haut. Si illisible: brut=0. REPONDS JSON: brut (nombre), restaurant (Jolene/Molo/Aina), periode (chaine date)";
  const body={
    contents:[{parts:[
      {inline_data:{mime_type:mimeType,data:b64}},
      {text:prompt}
    ]}],
    generationConfig:{temperature:0.0,responseMimeType:"application/json"}
  };
  // Try each model until one works
  for(const model of GEMINI_MODELS){
    try{
      const url=GEMINI_BASE+model+":generateContent?key="+GEMINI_KEY;
      const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
      const data=await res.json();
      if(data.error){
        console.log("Model "+model+" failed: "+data.error.message);
        continue;
      }
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      return JSON.parse(text.replace(/```json|```/g,"").trim());
    }catch(e){console.log("Model "+model+" error: "+e.message);}
  }
  throw new Error("Tous les modeles Gemini ont echoue - entre le Brut manuellement");
}

async function geminiText(prompt){
  const body={
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.3}
  };
  const res=await fetch(GEMINI_URL+"?key="+GEMINI_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function deepseekText(prompt){
  const res=await fetch(DU,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+DK},body:JSON.stringify({model:"deepseek-chat",max_tokens:800,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return data.choices?.[0]?.message?.content||"";
}

async function aiVentes(b64){
  try{
    const res=await geminiRead(b64);
    if(res.erreur)throw new Error(res.erreur);
    if(!res.brut||res.brut<100)throw new Error("Montant non detecte - entre manuellement");
    return res;
  }catch(e){
    throw new Error(e.message||"Lecture impossible");
  }
}

async function aiAchat(b64){
  const noms=S.fournisseurs.map(f=>f.nom).join(", ");
  const body={
    contents:[{parts:[
      {inline_data:{mime_type:"image/jpeg",data:b64}},
      {text:"Analyse cette facture achat. Fournisseurs possibles: "+noms+". REPONDS JSON uniquement avec les champs: fournisseur (string), montant (number), date (YYYY-MM-DD), ref (string)"}
    ]}],
    generationConfig:{temperature:0.0,responseMimeType:"application/json"}

  const res=await fetch(GEMINI_URL+"?key="+GEMINI_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});

  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ════ WEEKLY ANALYSIS (Gemini + DeepSeek) ════
async function generateWeeklyAnalysis(){
  const now=new Date();
  const weekAgo=new Date(now-7*24*60*60*1000);
  const recentV=S.ventes.filter(v=>new Date(v.date)>=weekAgo);
  const recentA=S.achats.filter(a=>new Date(a.date)>=weekAgo);
  const tvente=recentV.reduce((s,v)=>s+(v.totalTTC||0),0);
  const tachat=recentA.reduce((s,a)=>s+a.montant,0);
  const topArts=getTopArticles(5);
  const byRest=RESTS.map(r=>{
    const t=recentV.filter(v=>v.nom===r.nom||v.restaurant===r.nom).reduce((s,v)=>s+(v.totalTTC||0),0);
    return r.nom+": "+fmt(t)+" TND";
  }).join(", ");

  const prompt="Tu es consultant en restauration. Analyse ces donnees hebdomadaires Royal Events Traiteur Tunisie. " + "Periode: 7 derniers jours. " + "Ventes TTC: "+fmt(tvente)+" TND ("+recentV.length+" factures). " + "Achats: "+fmt(tachat)+" TND. " + "Marge: "+fmt(tvente-tachat)+" TND. " + "Ventes par restaurant: "+byRest+". " + "Top 5 articles: "+topArts.map(function(a){return a.nom+" ("+a.qty+" unites)";}).join(", ")+". " + "Fournis une analyse courte (5-7 phrases max): performance globale, point fort, point a surveiller, 1 recommandation actionnable. Sois direct et concret.";

  let analysisText="";
  try{
    const g=await geminiText(prompt);
    analysisText=g;
  }catch(e){}

  if(!analysisText){
    try{analysisText=await deepseekText(prompt);}catch(e){analysisText="Donnees insuffisantes pour une analyse. Ajoutez des factures pour generer des insights.";}
  }

  S.weeklyAnalysis={text:analysisText,date:now.toLocaleDateString("fr-FR")};
  save();
  return analysisText;
}

async function sendEmailSTJE(v){
  if(!S.settings.ejs_service||!S.settings.ejs_template||!S.settings.ejs_key){

  const c=S.clients.find(x=>x.id===v.clientId)||{};

  // Send to both STJE emails
  for(const email of STJE_EMAILS){
    await emailjs.send(S.settings.ejs_service,S.settings.ejs_template,{
      to_name:c.nom||"",to_email:email,from_name:S.entreprise.nom,
      invoice_ref:v.ref,periode:v.periode||"",montant:fmt(v.totalTTC),

      pdf_attachment:pdfB64,

  }
}

    "<div style=\"flex:1;background:#FEF3C7;border-radius:10px;padding:10px;text-align:center\"><div style=\"font-size:9px;color:#92400E;font-weight:700;margin-bottom:3px\">DU</div><div style=\"font-weight:800;font-size:14px;color:#92400E\">"+fmt(tv-tp)+"</div></div>"+
    "<div style=\"flex:1;background:#EFF6FF;border-radius:10px;padding:10px;text-align:center\"><div style=\"font-size:9px;color:#2563EB;font-weight:700;margin-bottom:3px\">TOTAL</div><div style=\"font-weight:800;font-size:14px;color:#2563EB\">"+fmt(tv)+"</div></div></div>"+

function openFM(id){
  const f=id?S.fournisseurs.find(function(f){return f.id===id;}):null;
  document.getElementById("m-fourn-t").textContent=id?"Modifier fournisseur":"Nouveau fournisseur";

    "<div class=\"field\"><label>Nom</label><input type=\"text\" id=\"fn\" value=\""+(f?f.nom:"")+"\" /></div>"+
    "<div class=\"field\"><label>Email</label><input type=\"email\" id=\"fe\" value=\""+(f?f.email:"")+"\" /></div>"+
    "<div class=\"field\"><label>Tel</label><input type=\"text\" id=\"ft\" value=\""+(f?f.tel:"")+"\" /></div>"+
    "<div class=\"field\"><label>MF</label><input type=\"text\" id=\"fm\" value=\""+(f?f.mf:"")+"\" /></div>"+
    "<div style=\"display:flex;gap:8px;flex-wrap:wrap\"><button class=\"btn bp\" onclick=\"saveF("+(id||"null")+")\">Enregistrer</button>"+(id?"<button class=\"btn bd\" onclick=\"delF("+id+")\">Supprimer</button>":"")+"</div>";

}
function saveF(id){
  const d={nom:document.getElementById("fn").value,email:document.getElementById("fe").value,tel:document.getElementById("ft").value,mf:document.getElementById("fm").value};
  if(!d.nom)return;
  if(id){const i=S.fournisseurs.findIndex(function(f){return f.id===id;});if(i!==-1)S.fournisseurs[i]={...S.fournisseurs[i],...d};}
  else S.fournisseurs.push({id:uid(),...d});
  save();cm("m-fourn");renderClients();
}
function delF(id){if(!confirm("Supprimer?"))return;S.fournisseurs=S.fournisseurs.filter(function(f){return f.id!==id;});save();cm("m-fourn");renderClients();}
function showFD(id){
  const f=S.fournisseurs.find(function(f){return f.id===id;});if(!f)return;
  const as=S.achats.filter(function(a){return a.fournisseurId===id;});
  const ta=as.reduce(function(s,a){return s+a.montant;},0);
  const tp=as.filter(function(a){return a.statut==="Payee";}).reduce(function(s,a){return s+a.montant;},0);
  document.getElementById("m-detail-t").textContent=f.nom;
  document.getElementById("m-detail-c").innerHTML=
    "<div style=\"display:flex;gap:8px;margin-bottom:13px\">"+
    "<div style=\"flex:1;background:#F0FDF4;border-radius:10px;padding:9px;text-align:center\"><div style=\"font-size:9px;color:#16A34A;font-weight:700;margin-bottom:2px\">PAYE</div><div style=\"font-weight:800;font-size:14px;color:#16A34A\">"+fmt(tp)+"</div></div>"+
    "<div style=\"flex:1;background:#FEF3C7;border-radius:10px;padding:9px;text-align:center\"><div style=\"font-size:9px;color:#92400E;font-weight:700;margin-bottom:2px\">RESTANT</div><div style=\"font-weight:800;font-size:14px;color:#92400E\">"+fmt(ta-tp)+"</div></div></div>"+
    "<button class=\"btn bo bsm\" style=\"margin-bottom:12px\" onclick=\"cm('m-detail');openFM("+id+")\">✏️ Modifier</button>"+

    (as.length===0?"<p style=\"color:#9CA3AF;font-size:12px\">Aucun achat</p>":as.map(function(a){return "<div style=\"display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F5F5F5\"><div><div style=\"font-size:12px;font-weight:600\">"+a.ref+"</div><div style=\"font-size:10px;color:#9CA3AF\">"+fmtD(a.date)+"</div></div><div style=\"text-align:right\"><div style=\"font-weight:700;font-size:12px\">"+fmt(a.montant)+" TND</div></div></div>";}).join(""));
  om("m-detail");
}

// ════ ARCHIVES ════
let archM=new Date().getMonth(),archT="ventes";
function renderArchives(){
  document.getElementById("view-archives").innerHTML=
    "<div class=\"chips\">"+MOIS.map(function(m,i){return "<button class=\"chip "+(archM===i?"chip-on":"chip-off")+"\" onclick=\"selAM("+i+")\">"+m.slice(0,3)+"</button>";}).join("")+"</div>"+
    "<div id=\"arch-sum\" class=\"card\" style=\"margin-bottom:13px\"></div>"+
    "<div class=\"tab-bar\"><button class=\"tab-btn "+(archT==="ventes"?"active":"")+"\" onclick=\"switchAT('ventes',this)\">Ventes</button><button class=\"tab-btn "+(archT==="achats"?"active":"")+"\" onclick=\"switchAT('achats',this)\">Achats</button></div>"+
    "<div id=\"arch-list\"></div>";
  renderASum();renderAList();
}
function selAM(i){archM=i;renderArchives();}
function switchAT(t,btn){archT=t;document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");renderAList();}
function renderASum(){
  const vF=S.ventes.filter(function(v){return v.mois===archM;}),aF=S.achats.filter(function(a){return a.mois===archM;});
  const tv=vF.reduce(function(s,v){return s+(v.totalTTC||0);},0),ta=aF.reduce(function(s,a){return s+a.montant;},0);
  document.getElementById("arch-sum").innerHTML=
    "<div class=\"sec-title\">"+MOIS[archM]+"</div>"+
    "<div style=\"display:flex;justify-content:space-between\">"+
    "<div><div style=\"font-size:10px;color:#9CA3AF;margin-bottom:2px\">Ventes TTC</div><div style=\"font-size:15px;font-weight:800\">"+fmt(tv)+" TND</div></div>"+
    "<div><div style=\"font-size:10px;color:#9CA3AF;margin-bottom:2px\">Achats</div><div style=\"font-size:15px;font-weight:800\">"+fmt(ta)+" TND</div></div>"+
    "<div><div style=\"font-size:10px;color:#9CA3AF;margin-bottom:2px\">Marge</div><div style=\"font-size:15px;font-weight:800;color:"+(tv-ta>=0?"#16A34A":"#DC2626")+"\">"+fmt(tv-ta)+" TND</div></div></div>";
}
function renderAList(){
  const el=document.getElementById("arch-list");if(!el)return;
  if(archT==="ventes"){
    const items=S.ventes.filter(function(v){return v.mois===archM;});
    el.innerHTML=items.length===0?"<div class=\"empty\">Aucune vente</div>":items.map(function(v){return "<div class=\"li\"><div style=\"flex:1\"><div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px\"><span style=\"font-weight:700;font-size:13px\">"+v.clientNom+"</span>"+rTag(v.restaurant)+"</div><div style=\"font-size:11px;color:#9CA3AF\">"+v.ref+" · "+fmtD(v.date)+"</div></div><div style=\"text-align:right\"><div style=\"font-weight:800;font-size:14px;margin-bottom:5px\">"+fmt(v.totalTTC||0)+" TND</div><span class=\"badge "+bCls(v.statut)+"\"><span class=\"bd-dot\"></span>"+v.statut+"</span></div></div>";}).join("");
  }else{
    const items=S.achats.filter(function(a){return a.mois===archM;});
    el.innerHTML=items.length===0?"<div class=\"empty\">Aucun achat</div>":items.map(function(a){return "<div class=\"li\"><div><div style=\"font-weight:700;font-size:13px\">"+a.fournisseur+"</div><div style=\"font-size:11px;color:#9CA3AF\">"+a.ref+" · "+fmtD(a.date)+"</div></div><div style=\"text-align:right\"><div style=\"font-weight:800;font-size:14px;margin-bottom:5px\">"+fmt(a.montant)+" TND</div><span class=\"badge "+bCls(a.statut)+"\"><span class=\"bd-dot\"></span>"+a.statut+"</span></div></div>";}).join("");
  }
}

// ════ CATALOGUE ════
function renderCatalogue(){
  document.getElementById("view-catalogue").innerHTML=
    "<div style=\"margin-bottom:12px\"><button class=\"btn bp\" onclick=\"openArt()\">+ Ajouter article</button></div>"+
    S.articles.map(function(a){return "<div class=\"li\"><div style=\"flex:1\"><div style=\"font-weight:700;font-size:13px\">"+a.nom+"</div><div style=\"color:#9CA3AF;font-size:11px;margin-top:2px\">"+(a.ref?a.ref+" · ":"")+fmt(a.prix)+" TND/unite</div></div><div style=\"display:flex;gap:7px\"><button class=\"btn bs bsm\" onclick=\"openArt("+a.id+")\">✏️</button><button class=\"btn bd bsm\" onclick=\"delArt("+a.id+")\">🗑</button></div></div>";}).join("");
}
function openArt(id){
  const a=id?S.articles.find(function(a){return a.id===id;}):null;
  document.getElementById("m-art-c").innerHTML=
    "<div class=\"field\"><label>Nom</label><input type=\"text\" id=\"an\" value=\""+(a?a.nom:"")+"\" placeholder=\"Nom article\"/></div>"+
    "<div class=\"field\"><label>Reference</label><input type=\"text\" id=\"ar3\" value=\""+(a?a.ref:"")+"\" placeholder=\"Rf-XXX\"/></div>"+
    "<div class=\"field\"><label>Prix unitaire TND</label><input type=\"number\" id=\"ap\" value=\""+(a?a.prix:"")+"\" placeholder=\"0.000\" step=\"0.001\"/></div>"+
    "<div style=\"display:flex;gap:8px\"><button class=\"btn bp\" onclick=\"saveArt("+(id||"null")+")\">Enregistrer</button>"+(id?"<button class=\"btn bd\" onclick=\"delArt("+id+")\">Supprimer</button>":"")+"</div>";
  om("m-art");
}
function saveArt(id){
  const nom=document.getElementById("an").value,prix=Number(document.getElementById("ap").value);
  if(!nom||!prix)return;
  const d={nom:nom,ref:document.getElementById("ar3").value,prix:prix};
  if(id){const i=S.articles.findIndex(function(a){return a.id===id;});if(i!==-1)S.articles[i]={...S.articles[i],...d};}
  else S.articles.push({id:uid(),...d});
  save();cm("m-art");renderCatalogue();
}
function delArt(id){if(!confirm("Supprimer?"))return;S.articles=S.articles.filter(function(a){return a.id!==id;});save();cm("m-art");renderCatalogue();}

// ════ PARAMETRES ════
function renderParams(){
  const ent=S.entreprise,st=S.settings;
  document.getElementById("view-params").innerHTML=
    "<div class=\"card\" style=\"margin-bottom:12px\"><div class=\"sec-title\">🏢 Mon entreprise</div>"+
    "<div class=\"field\"><label>Nom</label><input type=\"text\" id=\"pn\" value=\""+(ent.nom||"")+"\" /></div>"+
    "<div class=\"field\"><label>Matricule fiscal</label><input type=\"text\" id=\"pmf\" value=\""+(ent.mf||"")+"\" /></div>"+
    "<div class=\"field\"><label>Email</label><input type=\"email\" id=\"pem\" value=\""+(ent.email||"")+"\" /></div>"+
    "<div class=\"field\"><label>Tel</label><input type=\"text\" id=\"ptel\" value=\""+(ent.tel||"")+"\" /></div>"+
    "<div class=\"field\"><label>Adresse</label><input type=\"text\" id=\"pad\" value=\""+(ent.adresse||"")+"\" /></div>"+
    "<button class=\"btn bp\" onclick=\"saveEnt()\">Enregistrer</button></div>"+

    "<div class=\"alert a-info\" style=\"margin-bottom:12px\"><b>Les emails STJE vont a:</b><br>bilel_boulaares@yahoo.fr et lecap.restaurants@gmail.com<br>Fontana Events: PDF uniquement (pas email)</div>"+
    "<div class=\"field\"><label>Service ID</label><input type=\"text\" id=\"ejs1\" value=\""+(st.ejs_service||"")+"\" placeholder=\"service_xxx\"/></div>"+
    "<div class=\"field\"><label>Template ID</label><input type=\"text\" id=\"ejs2\" value=\""+(st.ejs_template||"")+"\" placeholder=\"template_xxx\"/></div>"+
    "<div class=\"field\"><label>Public Key</label><input type=\"text\" id=\"ejs3\" value=\""+(st.ejs_key||"")+"\" placeholder=\"xxxx\"/></div>"+
    "<div style=\"display:flex;gap:8px;flex-wrap:wrap\"><button class=\"btn bp\" onclick=\"saveEJS()\">Enregistrer</button><button class=\"btn bs\" onclick=\"testEJS()\">Tester</button></div>"+
    (st.ejs_key?"<div class=\"alert a-ok\" style=\"margin-top:10px\">EmailJS configure</div>":"<div class=\"alert a-warn\" style=\"margin-top:10px\">EmailJS non configure</div>")+
    "</div>"+
    "<div class=\"card\"><div class=\"sec-title\">🍽 Restaurants</div>"+
    RESTS.map(function(r){return "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:9px;background:#F9FAFB;border-radius:10px\"><div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:"+r.col+"\"></div><span style=\"font-weight:700\">"+r.nom+"</span></div><div style=\"display:flex;gap:6px\"><span style=\"background:#F3F4F6;padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px\">x"+r.taux+"</span><span style=\"background:#EFF6FF;color:#1D4ED8;padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px\">min "+r.minItems+" art.</span><span style=\"background:"+(r.sendEmail?"#DCFCE7":"#F3F4F6")+";color:"+(r.sendEmail?"#166534":"#6B7280")+";padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px\">"+(r.sendEmail?"Email":"PDF")+"</span></div></div>";}).join("")+
    "<div class=\"alert a-info\" style=\"margin-top:8px\">Formule: Brut / 1.07 x taux = HT</div></div>";
}
function saveEnt(){S.entreprise={...S.entreprise,nom:document.getElementById("pn").value,mf:document.getElementById("pmf").value,email:document.getElementById("pem").value,tel:document.getElementById("ptel").value,adresse:document.getElementById("pad").value};save();alert("Enregistre!");}
function saveEJS(){
  S.settings.ejs_service=document.getElementById("ejs1").value.trim();
  S.settings.ejs_template=document.getElementById("ejs2").value.trim();
  S.settings.ejs_key=document.getElementById("ejs3").value.trim();
  save();if(S.settings.ejs_key)emailjs.init(S.settings.ejs_key);renderParams();alert("EmailJS configure!");
}
async function testEJS(){
  if(!S.settings.ejs_key){alert("Configure EmailJS d'abord");return;}
  try{
    emailjs.init(S.settings.ejs_key);
    await emailjs.send(S.settings.ejs_service,S.settings.ejs_template,{to_name:"Test",to_email:S.entreprise.email,invoice_ref:"TEST-001",periode:"Test",montant:"0.000",message:"Test EmailJS Royal Events"},S.settings.ejs_key);
    alert("Email de test envoye a "+S.entreprise.email);
  }catch(e){alert("Erreur: "+(e.text||e.message||JSON.stringify(e)));}
}

// ════ NOTIFICATIONS ════
function checkUnpaid(){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  const days=S.settings.reminderDays||7;
  S.ventes.forEach(function(v){
    if(v.statut==="Payee")return;
    const diff=(Date.now()-new Date(v.date))/(1000*60*60*24);
    if(diff>=days)new Notification("Facture impayee — Royal Events",{body:v.ref+" · "+(v.clientNom||"")+" : "+fmt(v.totalTTC)+" TND"});
  });
}

// ════ WEEKLY ANALYSIS SCHEDULER ════
function checkWeeklyAnalysis(){
  if(!S.weeklyAnalysis||!S.weeklyAnalysis.date)return;
  const last=new Date(S.weeklyAnalysis.date.split("/").reverse().join("-"));
  const now=new Date();
  const diff=(now-last)/(1000*60*60*24);
  if(diff>=7){generateWeeklyAnalysis();}
}

// ════ PWA ════
function setupPWA(){
  const iconUrl="data:image/png;base64,"+LOGO_B64;
  let link=document.querySelector("link[rel='apple-touch-icon']");
  if(!link){link=document.createElement("link");link.rel="apple-touch-icon";document.head.appendChild(link);}
  link.href=iconUrl;
  const manifest={name:"Royal Events Traiteur",short_name:"RE Facturation",start_url:"./",display:"standalone",background_color:"#F7F7F8",theme_color:"#111111",icons:[{src:iconUrl,sizes:"512x512",type:"image/png"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  document.getElementById("manifest-link").href=URL.createObjectURL(blob);
}

// ════ INIT ════
function init(){
  load();
  setupPWA();
  if(S.settings.ejs_key&&S.settings.ejs_key.length>5)emailjs.init(S.settings.ejs_key);
  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
  checkUnpaid();
  checkWeeklyAnalysis();
  setInterval(checkUnpaid,60*60*1000);
  renderDash();
}
init();
</script>
