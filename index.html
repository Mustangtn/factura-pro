// Number to words FR
function nLet(n){
  const u=["","Un","Deux","Trois","Quatre","Cinq","Six","Sept","Huit","Neuf","Dix","Onze","Douze","Treize","Quatorze","Quinze","Seize","Dix-Sept","Dix-Huit","Dix-Neuf"];
  const d=["","","Vingt","Trente","Quarante","Cinquante","Soixante","Soixante","Quatre-Vingt","Quatre-Vingt"];
  function g(x){if(!x)return "";let r="";if(x>=100){r+=(Math.floor(x/100)===1?"Cent":u[Math.floor(x/100)]+" Cent");x%=100;if(x)r+=" ";}if(x>=20){const dz=Math.floor(x/10),un=x%10;if(dz===7||dz===9){r+=d[dz]+"-"+u[10+un];}else{r+=d[dz];if(un===1&&dz!==8)r+="-Et-Un";else if(un)r+="-"+u[un];}}else if(x>0)r+=u[x];return r;}
  let ent=Math.floor(n),dec=Math.round((n-ent)*1000);
  let res="";
  if(ent>=1000){const m=Math.floor(ent/1000);res+=(m===1?"Mille":g(m)+" Mille");ent%=1000;if(ent)res+=" ";}
  if(ent)res+=g(ent);
  res+=" Dinars";
  if(dec>0)res+=" Et "+g(dec)+" Millimes";
  return res.trim();
}

// ═══════════════ ARTICLE SELECTION — minimum enforced ════════════════
function pickArticles(targetHT, arts, minItems){
  minItems = minItems||10;
  const av=[...arts].filter(a=>a.prix>0).sort((a,b)=>b.prix-a.prix);
  const n=Math.min(minItems, av.length);

  // Step 1: qty=1 for each required article
  let sel=av.slice(0,n).map(a=>({...a,quantite:1,totalHT:Math.round(a.prix*1000)/1000}));

  // Step 2: remaining budget
  let usedHT=sel.reduce((s,a)=>s+a.totalHT,0);
  let remM=Math.round((targetHT-usedHT)*1000); // millimes

  // Step 3: fill remaining into most expensive article
  if(remM>0){
    const pm0=Math.round(av[0].prix*1000);
    const extraQ=Math.floor(remM/pm0);
    if(extraQ>0){sel[0].quantite+=extraQ;sel[0].totalHT=Math.round(sel[0].quantite*pm0)/1000;remM-=extraQ*pm0;}
    // Step 4: fill tiny remainder into cheaper articles
    for(let i=1;i<sel.length&&remM>0;i++){
      const pm=Math.round(sel[i].prix*1000);
      if(pm<=remM){const eq=Math.floor(remM/pm);sel[i].quantite+=eq;sel[i].totalHT=Math.round(sel[i].quantite*pm)/1000;remM-=eq*pm;}
    }
  }

  const tHT=Math.round(sel.reduce((s,a)=>s+a.totalHT,0)*1000)/1000;
  const taxes=Math.round(tHT*TVA*1000)/1000;
  const tTTC=Math.round((tHT+taxes)*1000)/1000;
  return {items:sel,totalHT:tHT,taxes,totalTTC:tTTC};
}

// ═══════════════ TOP ARTICLES ════════════════
function getTopArticles(n){
  n=n||10;
  const map={};
  S.ventes.forEach(v=>{
    (v.items||[]).forEach(it=>{
      if(!map[it.nom])map[it.nom]={nom:it.nom,qty:0,ht:0,factures:0};
      map[it.nom].qty+=Number(it.quantite)||0;
      map[it.nom].ht+=Number(it.totalHT)||0;
      map[it.nom].factures++;
    });
  });
  return Object.values(map).sort((a,b)=>b.qty-a.qty).slice(0,n);
}

    ? [{type:"text",text:prompt},{type:"image_url",image_url:{url:`data:image/jpeg;base64,${img}`}}]
    : prompt;
  const res=await fetch(DU,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${DK}`},body:JSON.stringify({model,max_tokens:500,messages:[{role:"user",content}]})});
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||"API error");
  return data.choices?.[0]?.message?.content||"{}";
}

async function aiVentes(b64){
  // Improved prompt: very explicit about reading the BRUT column from LAST total row
  const prompt=`Tu regardes une photo d'un écran montrant un rapport de statistiques articles d'un restaurant (rapport "210 - Statistique Articles").
Le tableau a ces colonnes: Désignation | TTC | Remise | Brut | Hors taxes | Quantité.
En bas du tableau il y a des lignes de totaux en gras (JOLENE, MOLO ou AINA puis un grand total).
TACHE: Trouver la ligne totale qui s'appelle "JOLENE" ou "MOLO" ou "AINA" (en majuscules, en gras, vers le bas du tableau).
Lire le chiffre dans la colonne "Brut" de cette ligne. Ce chiffre est grand (ex: 28067, 15000...). C'est PAS la colonne TTC ni Hors taxes, c'est BRUT.
Lire aussi la période (date de début - date de fin) affichée en haut du rapport.
REPONSE: JSON uniquement, rien d'autre:
{"brut":28067,"restaurant":"Jolene","periode":"30/03/26 - 05/04/26"}`;
  const t=await aiCall(prompt,b64);
  return JSON.parse(t.replace(/```json|```/g,"").trim());
}

  // ── FOOTER ──
  doc.setTextColor(160,160,160);doc.setFont("helvetica","normal");doc.setFontSize(7.5);
  doc.text("https://fatouraenligne.tn/",15,284);
  doc.text("Page 1/1",195,284,{align:"right"});

  // ── VERTICAL FACTURE LABEL ──
  doc.setTextColor(200,200,200);doc.setFontSize(7);

async function sendEmail(v){
  if(!S.settings.ejs_service||!S.settings.ejs_template||!S.settings.ejs_key){
    throw new Error("EmailJS non configuré. Configure-le dans les Paramètres.");
  }
  const c=S.clients.find(x=>x.id===v.clientId)||{};
  const pdf=await makePDF(v);
  const pdfB64=pdf.output("datauristring").split(",")[1];
  await emailjs.send(S.settings.ejs_service,S.settings.ejs_template,{
    to_name:c.nom||"",
    to_email:c.email||"",
    from_name:S.entreprise.nom,
    invoice_ref:v.ref,
    periode:v.periode||"",
    montant:fmt(v.totalTTC),
    message:`Veuillez trouver ci-joint votre facture ${v.ref} pour la période : ${v.periode||"—"}.\n\nMontant total TTC : ${fmt(v.totalTTC)} DT\n\nCordialement,\n${S.entreprise.nom}`,
    pdf_attachment:pdfB64,
  },S.settings.ejs_key);
}

  const paye=sorted.filter(v=>v.statut==="Payée"||v.statut==="Payee").reduce((s,v)=>s+(v.totalTTC||0),0);

function addManuelCat(){
  const selEl=document.getElementById("mcat");
  const id=Number(selEl.value);
  const qty=Number(document.getElementById("mqty").value)||1;
  if(!id){alert("Choisis un article");return;}
  const art=S.articles.find(a=>a.id===id);
  if(!art)return;
  const existing=MT.items.findIndex(it=>it.nom===art.nom&&it.prix===art.prix);
  if(existing>=0){MT.items[existing].quantite+=qty;MT.items[existing].totalHT=Math.round(MT.items[existing].quantite*art.prix*1000)/1000;}
  else MT.items.push({nom:art.nom,ref:art.ref||"",prix:art.prix,quantite:qty,totalHT:Math.round(qty*art.prix*1000)/1000});
  selEl.value="";
  renderManuelItems();
}

function addManuelFree(){
  const nom=document.getElementById("mfnom").value.trim();
  const qty=Number(document.getElementById("mfqty").value)||1;
  const prix=Number(document.getElementById("mfprix").value);
  if(!nom||!prix){alert("Remplis le nom et le prix");return;}
  MT.items.push({nom,ref:"",prix,quantite:qty,totalHT:Math.round(qty*prix*1000)/1000});
  document.getElementById("mfnom").value="";
  document.getElementById("mfprix").value="";
  renderManuelItems();
}

async function saveManuel(send){
  if(MT.items.length===0){alert("Ajoute au moins un article");return;}
  const cId=Number(document.getElementById("mc")?.value||MT.clientId);
  const c=S.clients.find(x=>x.id===cId)||{};
  MT.ref=document.getElementById("mref")?.value||MT.ref;
  MT.date=document.getElementById("mdate")?.value||MT.date;
  MT.periode=document.getElementById("mper")?.value||MT.periode||"";
  MT.restaurant=document.getElementById("mr")?.value||MT.restaurant;
  const tHT=Math.round(MT.items.reduce((s,it)=>s+it.totalHT,0)*1000)/1000;
  const taxes=Math.round(tHT*TVA*1000)/1000;
  const tTTC=Math.round((tHT+taxes)*1000)/1000;
  const v={id:S.nextVId++,ref:MT.ref,restaurant:MT.restaurant,clientId:cId,clientNom:c.nom||"—",date:MT.date,periode:MT.periode,brut:0,montHT:tHT,items:MT.items,totalHT:tHT,taxes,totalTTC:tTTC,statut:"En attente",mois:new Date(MT.date).getMonth(),manuel:true};
  S.nextFNum++;S.ventes.unshift(v);save();

  if(send){
    document.getElementById("m-manuel-c").innerHTML=`<div class="ai-box"><div class="ai-spin">📧</div><p style="font-weight:700;font-size:14px">Envoi en cours...</p></div>`;
    try{
      await sendEmail(v);v.statut="Envoyée";save();
      document.getElementById("m-manuel-c").innerHTML=`<div class="alert a-ok">✓ Facture envoyée à ${c.email||"—"} !</div><button class="btn bp bfull" style="margin-top:12px" onclick="cm('m-manuel');renderFact()">Fermer</button>`;
    }catch(e){
      document.getElementById("m-manuel-c").innerHTML=`<div class="alert a-err">Erreur: ${e.message}</div><button class="btn bp bfull" style="margin-top:10px" onclick="cm('m-manuel');renderFact()">Fermer sans email</button>`;
    }
  }else{
    try{const pdf=await makePDF(v);pdf.save(v.ref.replace("/","_")+".pdf");}catch(e){console.error(e);}
    cm("m-manuel");renderFact();renderVentes();
  }
}

  const r=RESTS.find(r=>r.nom===VT.restaurant)||RESTS[0];

  const v={id:S.nextVId++,ref:VT.ref,restaurant:VT.restaurant,clientId:cId,clientNom:c.nom||"—",date:VT.date,periode:VT.periode,brut:Number(VT.brut),montHT:VT.montHT,items:VT.items,totalHT:VT.totalHT,taxes:VT.taxes,totalTTC:VT.totalTTC,statut:"En attente",mois:new Date(VT.date).getMonth()};
  S.nextFNum++;S.ventes.unshift(v);save();

  if(send){
    loader("m-vente-c","Génération du PDF & envoi email...");

    }
  }else{
    try{const pdf=await makePDF(v);pdf.save(v.ref.replace("/","_")+".pdf");}catch(e){console.error(e);}
    cm("m-vente");renderVentes();renderFact();
  }
}

function openAManuel(){AT={};renderAForm();om("m-achat");}
async function handleAPhoto(e){
  const file=e.target.files[0];if(!file)return;
  om("m-achat");loader("m-achat-c","Lecture de la facture...");
  try{const b64=await toB64(file);const res=await aiAchat(b64);const f=S.fournisseurs.find(f=>f.nom===res.fournisseur)||S.fournisseurs[0];AT={fId:f?.id,ref:res.ref||"",date:res.date||today(),montant:res.montant?String(res.montant):""};renderAForm(true);}
  catch(err){AT={};renderAForm(false,"Erreur IA — saisis manuellement");}
  e.target.value="";
}

function renderAForm(ok,err){
  ok=ok||false;err=err||"";
  const fOpts=S.fournisseurs.map(f=>`<option value="${f.id}" ${f.id===AT.fId?"selected":""}>${f.nom}</option>`).join("");
  document.getElementById("m-achat-c").innerHTML=`
    ${ok?'<div class="alert a-ok">✓ Données extraites — vérifie si besoin</div>':""}
    ${err?`<div class="alert a-err">${err}</div>`:""}
    <div class="field"><label>Fournisseur</label><select id="af">${fOpts}</select></div>
    <div class="field"><label>Référence</label><input type="text" id="ar" value="${AT.ref||""}" placeholder="ACH-XXX"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Date</label><input type="date" id="ad" value="${AT.date||today()}"/></div>
      <div class="field"><label>Montant (TND)</label><input type="number" id="am" value="${AT.montant||""}" placeholder="0.000" step="0.001"/></div>
    </div>
    <button class="btn bp bfull" onclick="saveA()">Enregistrer</button>`;
}
function saveA(){
  const fId=Number(document.getElementById("af").value);
  const f=S.fournisseurs.find(x=>x.id===fId);
  const m=Number(document.getElementById("am").value);
  if(!f||!m)return;
  const dt=document.getElementById("ad").value||today();
  S.achats.unshift({id:S.nextAId++,ref:document.getElementById("ar").value||`ACH-${String(S.nextAId).padStart(3,"0")}`,fournisseur:f.nom,fournisseurId:fId,date:dt,montant:m,statut:"En attente",mois:new Date(dt).getMonth()});
  save();cm("m-achat");renderAchats();
}
function toggleAStat(id){const a=S.achats.find(a=>a.id===id);if(a){a.statut=a.statut==="Payée"?"En attente":"Payée";save();renderAchats();}}

}
function selAM(i){archM=i;renderArchives();}
function switchAT(t,btn){archT=t;document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderAList();}
function renderASum(){
  const vF=S.ventes.filter(v=>v.mois===archM),aF=S.achats.filter(a=>a.mois===archM);
  const tv=vF.reduce((s,v)=>s+(v.totalTTC||0),0),ta=aF.reduce((s,a)=>s+a.montant,0);
  document.getElementById("arch-sum").innerHTML=`
    <div class="sec-title">${MOIS[archM]}</div>
    <div style="display:flex;justify-content:space-between">
      <div><div style="font-size:10px;color:#9CA3AF;margin-bottom:2px">Ventes TTC</div><div style="font-size:15px;font-weight:800">${fmt(tv)} TND</div></div>
      <div style="text-align:center"><div style="font-size:10px;color:#9CA3AF;margin-bottom:2px">Achats</div><div style="font-size:15px;font-weight:800">${fmt(ta)} TND</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:#9CA3AF;margin-bottom:2px">Marge</div><div style="font-size:15px;font-weight:800;color:${tv-ta>=0?"#16A34A":"#DC2626"}">${fmt(tv-ta)} TND</div></div>
    </div>`;
}
function renderAList(){
  const el=document.getElementById("arch-list");if(!el)return;
  if(archT==="ventes"){
    const items=S.ventes.filter(v=>v.mois===archM);
    el.innerHTML=items.length===0?'<div class="empty">Aucune vente ce mois</div>':items.map(v=>`<div class="li"><div style="flex:1"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><span style="font-weight:700;font-size:13px">${v.clientNom}</span>${rTag(v.restaurant)}</div><div style="font-size:11px;color:#9CA3AF">${v.ref} · ${fmtD(v.date)}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:14px;margin-bottom:5px">${fmt(v.totalTTC||0)} TND</div><span class="badge ${bCls(v.statut)}"><span class="bd-dot"></span>${v.statut}</span></div></div>`).join("");
  }else{
    const items=S.achats.filter(a=>a.mois===archM);
    el.innerHTML=items.length===0?'<div class="empty">Aucun achat ce mois</div>':items.map(a=>`<div class="li"><div><div style="font-weight:700;font-size:13px">${a.fournisseur}</div><div style="font-size:11px;color:#9CA3AF">${a.ref} · ${fmtD(a.date)}</div></div><div style="text-align:right"><div style="font-weight:800;font-size:14px;margin-bottom:5px">${fmt(a.montant)} TND</div><span class="badge ${bCls(a.statut)}"><span class="bd-dot"></span>${a.statut}</span></div></div>`).join("");
  }
}

// ═══════════════ CATALOGUE ════════════════
function renderCatalogue(){
  document.getElementById("view-catalogue").innerHTML=`
    <div style="margin-bottom:12px"><button class="btn bp" onclick="openArt()">➕ Ajouter un article</button></div>
    ${S.articles.map(a=>`
      <div class="li">
        <div style="flex:1"><div style="font-weight:700;font-size:13px">${a.nom}</div><div style="color:#9CA3AF;font-size:11px;margin-top:2px">${a.ref?a.ref+" · ":""}${fmt(a.prix)} TND/unité</div></div>
        <div style="display:flex;gap:7px">
          <button class="btn bs bsm" onclick="openArt(${a.id})">✏️</button>
          <button class="btn bd bsm" onclick="delArt(${a.id})">🗑️</button>
        </div>
      </div>`).join("")}`;
}
function openArt(id){
  const a=id?S.articles.find(a=>a.id===id):{};
  document.getElementById("m-art-c").innerHTML=`
    <div class="field"><label>Nom *</label><input type="text" id="an" value="${a?.nom||""}" placeholder="Nom de l'article"/></div>
    <div class="field"><label>Référence</label><input type="text" id="ar3" value="${a?.ref||""}" placeholder="Rf-XXX"/></div>
    <div class="field"><label>Prix unitaire (TND) *</label><input type="number" id="ap" value="${a?.prix||""}" placeholder="0.000" step="0.001"/></div>
    <div style="display:flex;gap:8px">
      <button class="btn bp" onclick="saveArt(${id||"null"})">Enregistrer</button>
      ${id?`<button class="btn bd" onclick="delArt(${id})">Supprimer</button>`:""}
    </div>`;
  om("m-art");
}
function saveArt(id){
  const nom=document.getElementById("an").value,prix=Number(document.getElementById("ap").value);
  if(!nom||!prix)return;
  const d={nom,ref:document.getElementById("ar3").value,prix};
  if(id){const i=S.articles.findIndex(a=>a.id===id);if(i!==-1)S.articles[i]={...S.articles[i],...d};}
  else S.articles.push({id:uid(),...d});
  save();cm("m-art");renderCatalogue();
}
function delArt(id){if(!confirm("Supprimer ?"))return;S.articles=S.articles.filter(a=>a.id!==id);save();cm("m-art");renderCatalogue();}

// ═══════════════ PARAMÈTRES ════════════════
function renderParams(){
  const ent=S.entreprise,st=S.settings;
  document.getElementById("view-params").innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="sec-title">🏢 Mon entreprise</div>
      <div class="field"><label>Nom</label><input type="text" id="pn" value="${ent.nom||""}"/></div>
      <div class="field"><label>Matricule fiscal</label><input type="text" id="pmf" value="${ent.mf||""}"/></div>
      <div class="field"><label>Email Gmail</label><input type="email" id="pem" value="${ent.email||""}"/></div>
      <div class="field"><label>Téléphone</label><input type="text" id="ptel" value="${ent.tel||""}"/></div>
      <div class="field"><label>Adresse</label><input type="text" id="pad" value="${ent.adresse||""}"/></div>
      <button class="btn bp" onclick="saveEnt()">Enregistrer</button>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="sec-title">📧 EmailJS — Configuration email</div>
      <div class="alert a-info" style="margin-bottom:12px">
        <b>Comment configurer EmailJS:</b><br>
        1. Va sur <b>emailjs.com</b> → crée un compte gratuit<br>
        2. Ajoute un service Gmail (connecte ton Gmail)<br>
        3. Crée un template avec les variables: <b>to_name, to_email, invoice_ref, periode, montant, message</b><br>
        4. Dans Account → API Keys → copie ta Public Key<br>
        5. Colle les 3 identifiants ci-dessous
      </div>
      <div class="field"><label>Service ID</label><input type="text" id="ejs1" value="${st.ejs_service||""}" placeholder="service_xxxxxxx"/></div>
      <div class="field"><label>Template ID</label><input type="text" id="ejs2" value="${st.ejs_template||""}" placeholder="template_xxxxxxx"/></div>
      <div class="field"><label>Public Key</label><input type="text" id="ejs3" value="${st.ejs_key||""}" placeholder="xxxxxxxxxxxxxxx"/></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn bp" onclick="saveEJS()">💾 Enregistrer EmailJS</button>
        <button class="btn bs" onclick="testEJS()">🧪 Tester</button>
      </div>
      ${st.ejs_key?'<div class="alert a-ok" style="margin-top:10px">✓ EmailJS configuré</div>':'<div class="alert a-warn" style="margin-top:10px">⚠️ EmailJS non configuré — les emails ne fonctionneront pas</div>'}
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="sec-title">🔔 Rappels factures impayées</div>
      <div class="field"><label>Rappel après (jours)</label><input type="number" id="rdays" value="${st.reminderDays||7}" min="1" max="90"/></div>
      <div class="field"><label>Fréquence</label>
        <select id="rfreq">
          <option value="daily" ${st.reminderFreq==="daily"?"selected":""}>Quotidien</option>
          <option value="weekly" ${st.reminderFreq==="weekly"?"selected":""}>Hebdomadaire</option>
        </select>
      </div>
      <button class="btn bp" onclick="saveRem()">Enregistrer</button>
    </div>

    <div class="card">
      <div class="sec-title">🍽️ Restaurants & règles de facturation</div>
      ${RESTS.map(r=>`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:9px;background:#F9FAFB;border-radius:10px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:10px;height:10px;border-radius:50%;background:${r.col}"></div>
            <span style="font-weight:700;font-size:13px">${r.nom}</span>
          </div>
          <div style="display:flex;gap:6px">
            <span style="background:#F3F4F6;padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px">×${r.taux}</span>
            <span style="background:#EFF6FF;color:#1D4ED8;padding:3px 10px;border-radius:20px;font-weight:700;font-size:11px">min ${r.minItems} art.</span>
          </div>
        </div>`).join("")}
      <div class="alert a-info" style="margin-top:8px">Formule: Brut ÷ 1.07 × taux = Montant HT</div>
    </div>`;
}

function saveEnt(){S.entreprise={...S.entreprise,nom:document.getElementById("pn").value,mf:document.getElementById("pmf").value,email:document.getElementById("pem").value,tel:document.getElementById("ptel").value,adresse:document.getElementById("pad").value};save();alert("✓ Informations enregistrées !");}
function saveEJS(){
  S.settings.ejs_service=document.getElementById("ejs1").value.trim();
  S.settings.ejs_template=document.getElementById("ejs2").value.trim();
  S.settings.ejs_key=document.getElementById("ejs3").value.trim();
  save();
  if(S.settings.ejs_key)emailjs.init(S.settings.ejs_key);
  renderParams();
  alert("✓ EmailJS configuré !");
}
async function testEJS(){
  if(!S.settings.ejs_key){alert("Configure EmailJS d'abord");return;}
  try{
    emailjs.init(S.settings.ejs_key);
    await emailjs.send(S.settings.ejs_service,S.settings.ejs_template,{to_name:"Test",to_email:S.entreprise.email,invoice_ref:"TEST-001",periode:"Test",montant:"0.000",message:"Test de configuration EmailJS — Royal Events Traiteur"},S.settings.ejs_key);
    alert("✓ Email de test envoyé à "+S.entreprise.email);
  }catch(e){alert("Erreur: "+e.text||e.message||JSON.stringify(e));}
}
function saveRem(){S.settings.reminderDays=Number(document.getElementById("rdays").value);S.settings.reminderFreq=document.getElementById("rfreq").value;save();checkUnpaid();alert("✓ Rappels configurés !");}

// ═══════════════ NOTIFICATIONS ════════════════
function checkUnpaid(){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  const days=S.settings.reminderDays||7;
  S.ventes.forEach(v=>{
    if(v.statut!=="En attente")return;
    const diff=(Date.now()-new Date(v.date))/(1000*60*60*24);
    if(diff>=days)new Notification("⚠️ Facture impayée — Royal Events",{body:`${v.ref} · ${v.clientNom||""} : ${fmt(v.totalTTC)} TND`,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><rect width='80' height='80' rx='18' fill='%23111'/><path d='M14 52L22 30L32 44L40 24L48 44L58 30L66 52H14Z' fill='%23D4A017'/></svg>"});
  });
}

// ═══════════════ PWA ════════════════
function setupPWA(){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='115' fill='%23111'/><path d='M90 336L170 190L258 280L256 152L354 280L440 190L510 336H90Z' fill='%23D4A017' stroke='%23D4A017' stroke-width='8' stroke-linejoin='round'/><rect x='90' y='348' width='332' height='44' rx='18' fill='%23D4A017'/></svg>`;
  const iconUrl="data:image/svg+xml,"+svg;
  let link=document.querySelector("link[rel='apple-touch-icon']");
  if(!link){link=document.createElement("link");link.rel="apple-touch-icon";document.head.appendChild(link);}
  link.href=iconUrl;
  const manifest={name:"Royal Events Traiteur Facturation",short_name:"RE Facturation",start_url:"./",display:"standalone",background_color:"#F7F7F8",theme_color:"#111111",icons:[{src:iconUrl,sizes:"512x512",type:"image/svg+xml"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  document.getElementById("manifest-link").href=URL.createObjectURL(blob);
}

// ═══════════════ INIT ════════════════
function init(){
  load();
  setupPWA();
  if(S.settings.ejs_key&&S.settings.ejs_key.length>5)emailjs.init(S.settings.ejs_key);
  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
  checkUnpaid();
  setInterval(checkUnpaid,60*60*1000);
  renderDash();
}
init();
</script>
</body>
</html>
